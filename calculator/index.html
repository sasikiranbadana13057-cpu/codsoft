<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="calculator">

    <div class="display">
      <input type="text" id="screen" placeholder="0" readonly>
    </div>

    <div class="buttons">

      <button class="btn clear">AC</button>
      <button class="btn delete">DEL</button>
      <button class="btn operator">%</button>
      <button class="btn operator">/</button>

      <button class="btn">7</button>
      <button class="btn">8</button>
      <button class="btn">9</button>
      <button class="btn operator">*</button>

      <button class="btn">4</button>
      <button class="btn">5</button>
      <button class="btn">6</button>
      <button class="btn operator">-</button>

      <button class="btn">1</button>
      <button class="btn">2</button>
      <button class="btn">3</button>
      <button class="btn operator">+</button>

      <button class="btn zero">0</button>
      <button class="btn">.</button>
      <button class="btn equal">=</button>

    </div>

  </div>

  <script src="script.js"></script>
  
  <!-- Vercel Speed Insights -->
  <script type="module">
    import { inject } from 'https://cdn.jsdelivr.net/npm/@vercel/speed-insights@1.3.1/dist/index.mjs';
    inject();
  </script>
</body>
</html>
